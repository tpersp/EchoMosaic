<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Updating EchoMosaic…</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared/style.css') }}">
  <style>
    .progress { height: 10px; background: #333; border-radius: 6px; overflow: hidden; }
    .bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.35s ease; }
    .steps { list-style: none; padding: 0; margin: 0.75rem 0 0; display: grid; gap: 0.3rem; }
    .steps li { opacity: 0.65; }
    .steps li.active { opacity: 1; color: var(--text); }
    .steps li.done { opacity: 0.95; }
    .steps li.error { color: #ff6b6b; opacity: 1; }
    .status { margin-top: 0.75rem; opacity: 0.95; }
    .log-panel {
      margin-top: 1rem;
      background: #161616;
      border: 1px solid #303030;
      border-radius: 6px;
      padding: 0.85rem;
      font-family: 'Fira Mono', 'Consolas', monospace;
      font-size: 0.84rem;
      line-height: 1.45;
      height: 45vh;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-line.error { color: #ff7b7b; }
    .log-line.info { color: #ddd; }
    .log-line.dim { color: #999; }
  </style>
</head>
<body>
  <header class="top-bar">
    <h1>Updating…</h1>
    <nav>
      <a href="{{ url_for('dashboard_routes.dashboard') }}">Dashboard</a>
    </nav>
  </header>
  <div class="container">
    <p>We’re applying the latest update. This page now follows the real updater output.</p>
    <div class="progress"><div id="bar" class="bar"></div></div>
    <ul id="steps" class="steps">
      <li data-stage="fetch" class="active">Fetching latest code</li>
      <li data-stage="checkout">Selecting target version</li>
      <li data-stage="apply">Applying update</li>
      <li data-stage="dependencies">Updating dependencies</li>
      <li data-stage="restart">Restarting service</li>
      <li data-stage="wait_restart">Waiting for restart</li>
    </ul>
    <p id="status" class="status">Connecting…</p>
    <div id="log-output" class="log-panel" aria-live="polite"></div>
  </div>
  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
  <script>
    const stageOrder = ['fetch', 'checkout', 'apply', 'dependencies', 'restart', 'wait_restart'];
    const steps = Array.from(document.querySelectorAll('#steps li'));
    const bar = document.getElementById('bar');
    const statusEl = document.getElementById('status');
    const logOutput = document.getElementById('log-output');
    const socket = io();
    const headers = {};
    {% if api_key %}headers['X-API-Key'] = {{ api_key|tojson }};{% endif %}

    let updateStarted = false;
    let waitingForRestart = false;
    let completed = false;
    let startingUpdate = false;
    let restartPhaseReached = false;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function appendLog(text, kind = 'info') {
      if (!text) return;
      const line = document.createElement('div');
      line.className = `log-line ${kind}`;
      line.textContent = text;
      logOutput.appendChild(line);
      logOutput.scrollTop = logOutput.scrollHeight;
    }

    function setStage(stage, failed = false) {
      const idx = stageOrder.indexOf(stage);
      steps.forEach((step, index) => {
        step.classList.remove('active', 'done', 'error');
        if (failed && index === idx) {
          step.classList.add('error');
        } else if (idx >= 0 && index < idx) {
          step.classList.add('done');
        } else if (idx >= 0 && index === idx) {
          step.classList.add('active');
        }
      });
      const progressIndex = idx >= 0 ? idx : 0;
      const pct = Math.round((progressIndex / Math.max(1, stageOrder.length - 1)) * 100);
      bar.style.width = `${pct}%`;
    }

    async function waitForRestart() {
      if (waitingForRestart || completed) return;
      waitingForRestart = true;
      setStage('wait_restart');
      setStatus('Waiting for restart…');
      appendLog('Waiting for service to come back…', 'dim');
      const start = Date.now();
      let attempts = 0;
      const maxWaitMs = 120000;
      while (Date.now() - start <= maxWaitMs) {
        attempts += 1;
        try {
          const res = await fetch('/health', { cache: 'no-store' });
          if (res.ok) {
            completed = true;
            bar.style.width = '100%';
            steps.forEach(step => step.classList.remove('active', 'error'));
            steps.forEach(step => step.classList.add('done'));
            setStatus('Back online. Redirecting…');
            appendLog('Service is back online.', 'info');
            setTimeout(() => { window.location.href = '/'; }, 1200);
            return;
          }
        } catch (err) {
          // service is likely still restarting
        }
        setStatus(`Waiting for restart… (attempt ${attempts})`);
        await new Promise(resolve => setTimeout(resolve, Math.min(5000, 500 + attempts * 250)));
      }
      setStatus('Taking longer than usual. You can refresh the dashboard manually.');
      appendLog('Timed out while waiting for restart.', 'error');
    }

    socket.on('connect', async () => {
      if (completed) {
        return;
      }
      if (updateStarted || waitingForRestart || startingUpdate) {
        appendLog('Socket connected.', 'dim');
        if (waitingForRestart) {
          setStatus('Reconnected while waiting for restart…');
        }
        return;
      }
      startingUpdate = true;
      setStatus('Connected. Starting update…');
      appendLog('Socket connected. Starting update job…', 'dim');
      try {
        const res = await fetch('/update_app', {
          method: 'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, headers),
          body: JSON.stringify({ socket_id: socket.id }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || `Update failed (${res.status})`);
        }
        updateStarted = true;
        appendLog('Update job accepted by server.', 'dim');
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        setStatus(`Update failed to start: ${msg}`);
        appendLog(`ERROR: ${msg}`, 'error');
      } finally {
        startingUpdate = false;
      }
    });

    socket.on('disconnect', () => {
      appendLog('Socket disconnected.', 'dim');
      if (restartPhaseReached && !completed) {
        waitForRestart();
      } else if (updateStarted && !completed) {
        setStatus('Connection dropped while update is still running. Waiting to reconnect…');
      }
    });

    socket.on('update_progress', (payload) => {
      if (!payload || completed) return;
      if (payload.stage) {
        setStage(payload.stage, !!payload.failed);
      }
      if (payload.line) {
        appendLog(payload.line, payload.failed ? 'error' : 'info');
      } else if (payload.message) {
        appendLog(payload.message, payload.failed ? 'error' : 'dim');
      }
      if (payload.message) {
        setStatus(payload.message);
      }
      if (payload.failed) {
        completed = true;
        appendLog('Update failed.', 'error');
        return;
      }
      if (payload.stage === 'wait_restart' || payload.complete) {
        restartPhaseReached = true;
      }
      if (payload.complete || payload.stage === 'wait_restart') {
        updateStarted = true;
        waitForRestart();
      }
    });
  </script>
</body>
</html>
