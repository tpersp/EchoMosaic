<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Update Status</title>
  <script>
    (function () {
      try {
        if (window.localStorage.getItem('sidebar-collapsed') === '1') {
          document.documentElement.classList.add('sidebar-collapsed');
        }
      } catch (err) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared/style.css') }}">
  <script src="{{ url_for('static', filename='shared/sidebar_shell.js') }}" defer></script>
  <style>
    .update-page-layout {
      width: min(820px, 100%);
      margin: 0 auto;
    }
    .update-status-card {
      width: 100%;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
    }
    .update-status-card p {
      margin-bottom: 0;
    }
  </style>
  <script>
    setTimeout(function(){ window.location.href = '{{ url_for('dashboard_routes.dashboard') }}'; }, 10000);
  </script>
</head>
<body class="dashboard-page">
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <div class="dashboard-sidebar-brand">
        <div class="dashboard-sidebar-brand-head">
          <div class="dashboard-sidebar-brand-copy">
            <h1>EchoMosaic</h1>
            <p>Update Status</p>
          </div>
          <button id="sidebar-toggle" class="sidebar-shell-toggle" type="button" aria-label="Collapse sidebar" title="Collapse sidebar" aria-pressed="false">
            <span class="sidebar-shell-toggle-icon" aria-hidden="true">&laquo;</span>
          </button>
        </div>
      </div>

      <nav class="dashboard-sidebar-nav" aria-label="Primary">
        <a class="sidebar-link" href="{{ url_for('dashboard_routes.dashboard') }}" title="Dashboard">
          <span class="sidebar-item-icon" aria-hidden="true">▦</span>
          <span class="sidebar-item-label">Dashboard</span>
        </a>
        <a class="sidebar-link" href="{{ url_for('media_routes.media_management_page') }}" title="Media">
          <span class="sidebar-item-icon" aria-hidden="true">🗂</span>
          <span class="sidebar-item-label">Media</span>
        </a>
        <a class="sidebar-link is-active" href="{{ url_for('settings_operations.app_settings') }}" title="Settings">
          <span class="sidebar-item-icon" aria-hidden="true">⚙</span>
          <span class="sidebar-item-label">Settings</span>
        </a>
      </nav>

      <div class="dashboard-sidebar-footer">
        <button id="theme-toggle" class="sidebar-theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme"></button>
      </div>
    </aside>

    <main class="dashboard-workspace">
      <div class="dashboard-workspace-inner">
        <div class="update-page-layout">
          <header class="page-section-header">
            <h2>Update</h2>
          </header>

          <div class="update-status-card">
            <p>{{ message }}</p>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    (function(){
      const root = document.documentElement;
      const btn = document.getElementById('theme-toggle');
      function apply(theme){
        const t = (theme === 'light') ? 'light' : 'dark';
        root.setAttribute('data-theme', t);
        if (btn) btn.textContent = t === 'light' ? '\u2600' : '\u263D';
      }
      const saved = localStorage.getItem('theme') || 'dark';
      apply(saved);
      if (btn) btn.addEventListener('click', () => {
        const cur = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        const next = cur === 'light' ? 'dark' : 'light';
        apply(next);
        try { localStorage.setItem('theme', next); } catch(e){}
      });
    })();
  </script>
</body>
</html>
